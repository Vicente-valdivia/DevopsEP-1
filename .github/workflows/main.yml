name: Spring Boot CI/CD Pipeline

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:
  # 1. Análisis de Seguridad con Snyk
  snyk-scan:
    name: Snyk Security Scan
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: registrarcliente
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'maven'

      - name: Install Snyk CLI
        run: npm install -g snyk

      - name: Authenticate and Test
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: |
          snyk auth $SNYK_TOKEN
          snyk test --severity-threshold=high || true 

      - name: Generate Snyk JSON Report
        if: always()
        run: snyk test --json > snyk-report.json || true

      - name: Upload Snyk Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: snyk-report
          path: registrarcliente/snyk-report.json

  # 2. Pruebas unitarias y cobertura con JaCoCo
  test:
    name: Run Tests with JaCoCo
    runs-on: ubuntu-latest
    needs: snyk-scan
    defaults:
      run:
        working-directory: registrarcliente
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'maven'

      - name: Build and test
        run: mvn clean verify

      - name: Upload JaCoCo Report
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: registrarcliente/target/site/jacoco/

  # 3. Análisis de Calidad con SonarCloud
  sonar-analysis:
    name: SonarCloud Analysis
    runs-on: ubuntu-latest
    needs: test
    defaults:
      run:
        working-directory: registrarcliente
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Necesario para que Sonar analice el historial

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'maven'

      - name: Run SonarCloud Analysis
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          mvn verify sonar:sonar \
          -Dsonar.projectKey=Vicente-valdivia_DevopsEP-1 \
          -Dsonar.organization=vicente-valdivia \
          -Dsonar.host.url=https://sonarcloud.io

  # 4. Empaquetado final de la aplicación
  build:
    name: Build Jar
    runs-on: ubuntu-latest
    needs: sonar-analysis
    defaults:
      run:
        working-directory: registrarcliente
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'maven'

      - name: Package application
        run: mvn clean package -DskipTests

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-jar
          path: registrarcliente/target/*.jar

  # 5. Despliegue Automático Simulado (Cumple IE1, IE4 e IE5)
  deploy-simulado:
    name: Docker Build & Compose Deploy
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Descargar artefacto JAR
        uses: actions/download-artifact@v4
        with:
          name: app-jar
          path: registrarcliente/target/

      - name: Construir Imagen Docker (Orquestación)
        run: docker-compose build

      - name: Despliegue Automático Simulado
        run: docker-compose up -d